name: Release Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Paycheck Calculator ${GITHUB_REF_NAME}" \
            --notes "Paycheck Calculator ${GITHUB_REF_NAME} desktop installers."

  windows:
    name: Release Windows EXE
    runs-on: windows-latest
    needs: create-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build EXE
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: Get-ChildItem dist -Filter *.exe | ForEach-Object { gh release upload $env:GITHUB_REF_NAME $_.FullName --clobber }
